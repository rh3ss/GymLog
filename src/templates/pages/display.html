<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark position-relative">
        <div class="container-fluid d-flex justify-content-end align-items-center">
            <div class="d-flex align-items-center gap-3">
                <span class="text-white sub-text">Hallo {{ user_name }}</span>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-custom btn-logout">Logout</a>
            </div>
        </div>
        <div class="position-absolute top-50 start-50 translate-middle d-flex align-items-center">
            <span class="navbar-brand nav-text mb-0">GymLog</span>
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="GymLog Logo" class="nav-logo">
        </div>
    </nav>
    <div class="container mt-5">
        <div class="d-flex justify-content-center mt-4">
            <a href="{{ url_for('pages.overview') }}" class="btn btn-custom btn-switch mx-2">Übersicht</a>
            <a href="{{ url_for('pages.create') }}" class="btn btn-custom btn-switch mx-2">Anlegen</a>
            <a href="{{ url_for('pages.display') }}" class="btn btn-custom btn-switch mx-2">Anzeigen</a>
            <a href="{{ url_for('pages.statistics') }}" class="btn btn-custom btn-switch mx-2">Statistik</a>
        </div>
        <form method="GET" id="date-filtering">
            <div class="row mb-4 justify-content-center align-items-center gx-4 py-2">
                <div class="col-md-3 d-flex align-items-center mb-2 px-3">
                    <label class="form-label sub-text me-3 mb-0" for="filter_start_date">Von</label>
                    <input type="date" name="filter_start_date" class="form-control auto-submit" value="{{ value_filter_start_date }}" required>
                </div>
                <div class="col-md-3 d-flex align-items-center mb-2 px-3">
                    <label class="form-label sub-text me-3 mb-0" for="filter_end_date">Bis</label>
                    <input type="date" name="filter_end_date" class="form-control auto-submit" value="{{ value_filter_end_date }}" required>
                </div>
            </div>
        </form>
    </div>
    <script>
    document.querySelectorAll(".auto-submit").forEach(input => {
        input.addEventListener("change", function() {
            document.getElementById("date-filtering").submit();
        });
    });
    </script>
</body>
</html>
