<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4 auth-text">Login</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label auth-sub-text">E-Mail</label>
                            <input type="email" name="email" class="form-control {% if login_error %}is-invalid{% endif %}" required></input>
                        </div>
                        <div class="mb-3">
                            <label class="form-label auth-sub-text">Passwort</label>
                            <input type="password" name="password" class="form-control {% if login_error %}is-invalid{% endif %}" required></input>
                        </div>
                        {% if login_error %}
                            <div class="text-danger mb-3 auth-sub-text">Falsche Login-Daten</div>
                        {% endif %}
                        <button type="submit" class="btn btn-custom btn-login auth-sub-text">Einloggen</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('auth.register') }}" class="link auth-sub-text">Registrieren</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
